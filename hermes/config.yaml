model:
  provider: deepseek
  default: deepseek-v4-flash

# Credential/provider failover. When the primary (deepseek) is exhausted —
# rate-limit, billing, 5xx, or connection failure after agent.api_max_retries —
# hermes swaps to the next entry mid-turn. The xiaomi provider profile reads
# XIAOMI_API_KEY from ~/.hermes/.env (seeded by bootstrap-hermes.sh from the
# GHA secret). If that key is absent the chain entry resolves to no client and
# is skipped, so the fallback is a no-op until the secret is seeded — safe for
# forks. Failover is turn-scoped: each new turn restores deepseek first.
fallback_providers:
  - provider: xiaomi
    model: mimo-v2.5

terminal:
  backend: local
  timeout: 180

memory:
  memory_enabled: true
  user_profile_enabled: true

agent:
  max_turns: 90
  # DeepSeek V4 thinking mode is enabled by default server-side; reasoning_effort
  # controls how much it thinks. Set high for news dedup/summarization quality.
  reasoning_effort: high

image_gen:
  # GPT-Image-2: text rendering is the bottleneck for Layer 4 infographics
  # (FLUX-klein, the catalog default, hallucinates gibberish labels). At the
  # 8-images/day cap this stays under ~$0.27/day.
  model: fal-ai/gpt-image-2
  provider: fal
  use_gateway: false

web:
  # Per-capability split for Layer 2 (agent supplement). ddgs is keyless and
  # unmetered; tavily handles the rarer extract path within its 1k/mo free
  # tier. EXA_API_KEY is seeded in .env as a hot spare — swap by changing
  # extract_backend to "exa".
  search_backend: ddgs
  extract_backend: tavily

plugins:
  # Streams live traces (LLM calls + tool calls) to Langfuse. Needs the
  # `langfuse` SDK installed in hermes' venv (handled in the workflow) plus
  # HERMES_LANGFUSE_PUBLIC_KEY / HERMES_LANGFUSE_SECRET_KEY in ~/.hermes/.env
  # (written by bootstrap-hermes.sh from GHA secrets). Missing creds → hooks
  # no-op silently, hermes runs unchanged.
  enabled:
    - observability/langfuse
  disabled: []
