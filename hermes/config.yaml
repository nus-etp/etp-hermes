model:
  provider: deepseek
  default: deepseek-v4-flash

# Credential/provider failover. When the primary (deepseek) is exhausted —
# rate-limit, billing, 5xx, or connection failure after agent.api_max_retries —
# hermes swaps to the next entry mid-turn. The xiaomi provider profile reads
# XIAOMI_API_KEY from ~/.hermes/.env (seeded by bootstrap-hermes.sh from the
# GHA secret). If that key is absent the chain entry resolves to no client and
# is skipped, so the fallback is a no-op until the secret is seeded — safe for
# forks. Failover is turn-scoped: each new turn restores deepseek first.
fallback_providers:
  - provider: xiaomi
    model: mimo-v2.5

terminal:
  backend: local
  timeout: 180

memory:
  memory_enabled: true
  user_profile_enabled: true
  # External memory provider (augments built-in MEMORY.md, never replaces it).
  # "holographic" is the bundled, SQLite-backed store (plugins/memory/holographic)
  # — no external service, no API key, NumPy-optional. Chosen because it's the only
  # provider that fits this deployment: its DB lives at ~/.hermes/memory_store.db,
  # so it rides the existing `hermes backup` zip + Actions-cache state roundtrip
  # exactly like state.db (it's not in the backup strip list). The agent gets a
  # `fact_store` tool for unbounded structured recall alongside the always-on,
  # 2200-char MEMORY.md working set. Fails open: if the plugin can't load, the
  # built-in memory keeps working unchanged. Set to "" to disable.
  provider: holographic

agent:
  max_turns: 90
  # DeepSeek V4 thinking mode is enabled by default server-side; reasoning_effort
  # controls how much it thinks. Set high for news dedup/summarization quality.
  reasoning_effort: high
  # Disable hermes' native `web` toolset (web_search + web_extract) so the only
  # web search/fetch surface across all layers is the keyless Parallel Search
  # MCP server registered under `mcp_servers.parallel` below. Honored by
  # hermes_cli/tools_config._get_platform_tools (applied last, overrides all).
  # To roll back to the native tavily/exa backends, remove `web` from this list.
  disabled_toolsets:
    - web

image_gen:
  # GPT-Image-2: text rendering is the bottleneck for Layer 4 infographics
  # (FLUX-klein, the catalog default, hallucinates gibberish labels). At the
  # 8-images/day cap this stays under ~$0.27/day.
  model: fal-ai/gpt-image-2
  provider: fal
  use_gateway: false

# Web search/fetch is served by the keyless Parallel Search MCP server, not the
# native `web` toolset (disabled via agent.disabled_toolsets above). The MCP
# endpoint accepts anonymous requests at lower rate limits; to lift them later,
# add an `Authorization: Bearer ${PARALLEL_API_KEY}` header here and seed the
# secret in bootstrap-hermes.sh. The agent sees the server's tools as
# `mcp_parallel_web_search` and `mcp_parallel_web_fetch`.
mcp_servers:
  parallel:
    url: "https://search.parallel.ai/mcp"
  # Jina AI's hosted MCP (https://github.com/jina-ai/MCP). Keyless: read_url /
  # parallel_read_url (URL → clean Markdown) work anonymously at lower rate
  # limits — the agent sees them as `mcp_jina_read_url` /
  # `mcp_jina_parallel_read_url` and can use them as a second fetch surface when
  # a page resists Parallel's fetcher. The deterministic feed fallback uses the
  # same Jina engine via r.jina.ai in scripts/collect-candidates.py. NOTE: the
  # search_* tools (search_web/search_arxiv/...) require a JINA key and error out
  # keyless, so search stays on Parallel. To lift the read limits, add an
  # `Authorization: Bearer ${JINA_API_KEY}` header here and seed it in
  # bootstrap-hermes.sh (the JINA_API_KEY secret already exists for the Reader
  # prefetch step).
  jina:
    url: "https://mcp.jina.ai/v1"

# Inert while `web` is in agent.disabled_toolsets — kept so a one-line rollback
# (drop `web` from that list) restores the native tavily/exa backends, whose
# keys bootstrap-hermes.sh still seeds.
web:
  search_backend: tavily
  extract_backend: exa

plugins:
  # Streams live traces (LLM calls + tool calls) to Langfuse. Needs the
  # `langfuse` SDK installed in hermes' venv (handled in the workflow) plus
  # HERMES_LANGFUSE_PUBLIC_KEY / HERMES_LANGFUSE_SECRET_KEY in ~/.hermes/.env
  # (written by bootstrap-hermes.sh from GHA secrets). Missing creds → hooks
  # no-op silently, hermes runs unchanged.
  enabled:
    - observability/langfuse
  disabled: []
  # Config for the holographic memory provider (activated via memory.provider
  # above). SQLite at the default ~/.hermes/memory_store.db so it persists via
  # the backup-zip cache roundtrip. auto_extract stays false — let the agent
  # decide what to store via the fact_store tool rather than auto-mining every
  # turn (keeps writes intentional and the DB small in a daily cron).
  hermes-memory-store:
    db_path: $HERMES_HOME/memory_store.db
    auto_extract: false
    default_trust: 0.5

skills:
  # Native skill deny-list (consumed by hermes_cli/skills_config.py). Hermes
  # bundles ~90 skills; this pipeline only needs a handful, so every other
  # bundled skill is disabled here to keep the agent's skill surface small.
  # This is a DENY-list, not an allow-list: any skill a future `hermes update`
  # adds defaults to ENABLED and must be appended here to stay off. Names are
  # skill leaf-names (the `name:` frontmatter field), not category/name paths.
  #
  # KEPT (intentionally absent below): baoyu-infographic (Layer 4 infographics,
  # the only skill the prompts invoke), company-signals, arxiv, blogwatcher,
  # humanizer.
  disabled:
    - airtable
    - apple-notes
    - apple-reminders
