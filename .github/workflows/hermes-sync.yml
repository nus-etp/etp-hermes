name: hermes-sync

on:
  schedule:
    - cron: '0 13 * * *'        # daily 13:00 UTC = 21:00 SGT
  workflow_dispatch:

concurrency:
  group: hermes-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hermes
        run: |
          curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Bootstrap config
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: bash scripts/bootstrap-hermes.sh

      - name: Run news digest
        run: hermes -z "$(cat prompts/news.md)"

      - name: Persist agent learning
        run: |
          # Round-trip memory + skills so anything the agent wrote during this
          # run (via the `memory` or `skill_manage` tools) survives to the next
          # run. --delete keeps the repo in lock-step with ~/.hermes/ so removals
          # propagate too. Sessions/logs/state.db are intentionally excluded —
          # they're runtime audit/debug, not learning artifacts.
          mkdir -p hermes/memories hermes/skills
          rsync -a --delete ~/.hermes/memories/ hermes/memories/
          rsync -a --delete ~/.hermes/skills/   hermes/skills/

      - name: Commit and push
        run: |
          git config user.name  "hermes-bot"
          git config user.email "hermes-bot@users.noreply.github.com"
          git add signals/news/ hermes/memories/ hermes/skills/
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "chore(hermes): sync $(date -u +%F)"
            git push
          fi
