name: hermes-sync

on:
  schedule:
    - cron: '0 13 * * *'        # daily 13:00 UTC = 21:00 SGT
  workflow_dispatch:
    inputs:
      layers:
        description: 'Comma-separated layers to run (1=ingest, 2=agent supplement, 3=synthesis, 4=infographics). Default: 1,2,3,4.'
        required: false
        default: '1,2,3,4'

concurrency:
  group: hermes-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Metrics: deterministic, stdlib + matplotlib, independent of Hermes. Runs in
  # parallel with the `hermes` job. Writes data/metrics/<slug>.jsonl and
  # signals/metrics/<slug>.png and hands them to the `commit` job as an
  # artifact.
  # ---------------------------------------------------------------------------
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Collect public metrics
        # Appends today's snapshot per company to data/metrics/<slug>.jsonl.
        # Idempotent per UTC day. continue-on-error: don't fail the job over a
        # flaky upstream endpoint.
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run scripts/collect_metrics.py

      - name: Render metric charts
        # matplotlib is the only non-stdlib dep; uv run --with provides it
        # ad-hoc in an ephemeral venv (PEP 668-safe on Ubuntu 24.04).
        continue-on-error: true
        run: uv run --with matplotlib scripts/render_metrics.py

      - name: Upload metrics artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: metrics-output
          path: |
            data/metrics/
            signals/metrics/
          if-no-files-found: ignore
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Hermes: the news pipeline (Layers 1–3 plus fairness rotation and exclusion
  # filtering). Same logic as before, just emits its output as an artifact for
  # the `commit` job instead of committing in-place.
  # ---------------------------------------------------------------------------
  hermes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Install Hermes
        # Pinned install: the installer script is fetched at an immutable
        # commit (tag v2026.6.5) and checksum-verified before execution, and
        # --commit makes it check the agent code out at that same commit —
        # so a push to hermes-agent@main can't execute in this job, which
        # holds every pipeline secret plus a contents:write GITHUB_TOKEN.
        # To upgrade: `make pin-hermes REF=<new tag>` rewrites both values.
        env:
          HERMES_COMMIT: 3c231eb3979ab9c57d5cd6d02f1d577a3b718b43 # v2026.6.5
          HERMES_INSTALL_SHA256: 5562d544934751313f16c57ed3dd17b052600cd8fae9f6e6977bfc9ef1e72f38
        run: |
          curl -fsSL "https://raw.githubusercontent.com/NousResearch/hermes-agent/${HERMES_COMMIT}/scripts/install.sh" -o /tmp/hermes-install.sh
          echo "${HERMES_INSTALL_SHA256}  /tmp/hermes-install.sh" | sha256sum -c -
          bash /tmp/hermes-install.sh --commit "${HERMES_COMMIT}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Restore previous backup from cache
        # Round-trips ~/.hermes/ state across runs via a hermes-native zip.
        # restore-keys prefix-matches the most recent prior cache; a cold
        # first run misses gracefully (no zip on disk) and bootstrap still
        # seeds from the committed hermes/ tree.
        id: cache-restore
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /tmp/hermes-state.zip
          key: hermes-state-${{ github.run_id }}
          restore-keys: |
            hermes-state-

      - name: Import previous backup
        # Populates ~/.hermes/ with the prior run's memories, state.db,
        # kanban, channel directory, etc. Runs BEFORE bootstrap so the
        # repo's committed hermes/ tree still wins on overlay.
        run: |
          if [ -f /tmp/hermes-state.zip ]; then
            hermes import --force /tmp/hermes-state.zip
          else
            echo "no prior backup; cold start"
          fi

      - name: Bootstrap config
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          XIAOMI_API_KEY: ${{ secrets.XIAOMI_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          HERMES_LANGFUSE_PUBLIC_KEY: ${{ secrets.HERMES_LANGFUSE_PUBLIC_KEY }}
          HERMES_LANGFUSE_SECRET_KEY: ${{ secrets.HERMES_LANGFUSE_SECRET_KEY }}
          HERMES_LANGFUSE_BASE_URL: ${{ secrets.HERMES_LANGFUSE_BASE_URL }}
          # Label the daily pipeline's traces "production" so they split from
          # the eval suite (HERMES_LANGFUSE_ENV=eval) in Langfuse. Without this
          # the plugin falls back to the literal "default" environment.
          HERMES_LANGFUSE_ENV: production
        run: bash scripts/bootstrap-hermes.sh

      - name: Install ddgs + langfuse into hermes venv
        # ddgs: Layer 2's search_backend requires the `ddgs` PyPI package
        # importable from hermes' Python interpreter. The plugin does NOT
        # lazy-install — see plugins/web/ddgs/provider.py:65 — so without
        # this step, Layer 2 falls back to whichever extract backend has a
        # key (tavily) for search too, doubling Tavily quota usage.
        # langfuse: required by the bundled observability/langfuse plugin
        # (enabled via hermes/config.yaml). Plugin fails open without it,
        # but we want traces in CI, so install unconditionally.
        # The hermes installer builds the venv with uv and doesn't seed pip,
        # so we install via `uv pip` against the existing interpreter.
        run: uv pip install --quiet --python "$HOME/.hermes/hermes-agent/venv/bin/python" ddgs langfuse

      - name: Resolve layers to run
        id: layers
        run: |
          # Schedule cron always runs all three layers. workflow_dispatch can
          # override via the `layers` input (e.g. "3" to re-synthesize only).
          layers="${{ github.event.inputs.layers }}"
          layers="${layers:-1,2,3,4}"
          echo "layers=$layers" >> "$GITHUB_OUTPUT"
          case ",$layers," in (*,1,*) echo "run_l1=true" >> "$GITHUB_OUTPUT" ;; esac
          case ",$layers," in (*,2,*) echo "run_l2=true" >> "$GITHUB_OUTPUT" ;; esac
          case ",$layers," in (*,3,*) echo "run_l3=true" >> "$GITHUB_OUTPUT" ;; esac
          case ",$layers," in (*,4,*) echo "run_l4=true" >> "$GITHUB_OUTPUT" ;; esac

      - name: Restore feed cache
        if: steps.layers.outputs.run_l1 == 'true'
        id: feed-cache-restore
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: data/feed-cache.json
          key: feed-cache-${{ github.run_id }}
          restore-keys: |
            feed-cache-

      - name: Restore Jina cache
        # Carries data/jina-cache/ across runs so multi-runs within the 23h
        # TTL skip the network and don't burn Jina's 100/day free quota.
        if: steps.layers.outputs.run_l1 == 'true'
        id: jina-cache-restore
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: data/jina-cache
          key: jina-cache-${{ github.run_id }}
          restore-keys: |
            jina-cache-

      - name: Preflight feeds (conditional GET + body hash)
        # Emits data/changed-sources.json — the whitelist Layer 1 reads to
        # skip unchanged sources. Stdlib-only, so no uv setup needed.
        if: steps.layers.outputs.run_l1 == 'true'
        run: python3 scripts/preflight-feeds.py

      - name: Prefetch html_scrape via Jina Reader
        # For every html_scrape source listed as changed by preflight,
        # fetch https://r.jina.ai/<source-url> to get clean Markdown and
        # heuristically extract candidate items into data/jina-items.json.
        # The Layer 1 prompt reads that file first and only falls back to
        # LLM-driven HTML parsing for URLs the heuristic couldn't extract.
        # Fails open: a missing key, rate-limit, or extraction miss all
        # degrade to the prompt's existing path.
        if: steps.layers.outputs.run_l1 == 'true'
        env:
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          JINA_DAILY_BUDGET: "80"
        continue-on-error: true
        run: python3 scripts/jina-reader.py

      - name: Layer 1 — data ingestion
        if: steps.layers.outputs.run_l1 == 'true'
        run: hermes -z "$(cat prompts/ingest.md)"

      - name: Build gap-fill queue (fairness rotation)
        # Deterministic pre-step: writes signals/agent-queue.txt with the N
        # least-recently-queried gap-fill companies, ordered by ascending
        # last_queried date. The Layer 2 prompt consumes this as its
        # authoritative gap-fill cohort so the agent doesn't re-hit the same
        # prefix of companies.json every run.
        if: steps.layers.outputs.run_l2 == 'true'
        run: python3 scripts/select_gapfill_queue.py

      - name: Layer 2 — agent supplement
        if: steps.layers.outputs.run_l2 == 'true'
        continue-on-error: true
        run: hermes -z "$(cat prompts/agent_supplement.md)"

      - name: Record gap-fill queue as queried
        # Deterministic post-step: stamps every name in signals/agent-queue.txt
        # as queried today in signals/agent-queue-state.json. Backs the
        # fairness rotation read by select_gapfill_queue.py on the next run.
        if: steps.layers.outputs.run_l2 == 'true'
        run: python3 scripts/update_gapfill_state.py

      - name: Filter exclusions
        # Deterministic post-filter: drops items whose headline matches a
        # company's `exclude_terms` in data/companies.json. Runs before
        # synthesis so Layer 3 reads cleaned files. Idempotent; no-op when
        # nothing matches.
        if: steps.layers.outputs.run_l1 == 'true' || steps.layers.outputs.run_l2 == 'true'
        run: python3 scripts/filter_exclusions.py

      - name: Layer 3 — synthesis
        if: steps.layers.outputs.run_l3 == 'true'
        run: hermes -z "$(cat prompts/synthesis.md)"

      - name: Layer 4 — infographic generation
        # Generates a baoyu infographic PNG next to every brief that Layer 3
        # just created or modified. Gated on Layer 3 having run because the
        # input is the working-tree diff Layer 3 produced. continue-on-error:
        # image_generate is slow/flaky; a bad run must not block the daily
        # sync — same precedent as Layer 2.
        if: steps.layers.outputs.run_l4 == 'true' && steps.layers.outputs.run_l3 == 'true'
        continue-on-error: true
        run: hermes -z "$(cat prompts/infographics.md)"

      - name: Usage insights
        if: always()
        run: |
          # Hermes-native usage report (tokens, tools, sessions) for today's run.
          # Surfaced in the Actions job summary; not committed.
          {
            echo '## Hermes insights'
            echo '```'
            hermes insights --days 1 --source cli || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stage run logs
        if: always()
        run: |
          # Copy Hermes' per-run logs + session transcripts into the workspace
          # so upload-artifact can grab them. We don't commit these (audit/debug
          # artifacts, not learning), but uploading lets us inspect failures
          # without sshing into a runner. Exclude .env and auth.json — secrets.
          mkdir -p run-logs
          cp -r ~/.hermes/logs run-logs/ 2>/dev/null || true
          cp -r ~/.hermes/sessions run-logs/ 2>/dev/null || true

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: hermes-logs-${{ github.run_id }}
          path: run-logs/
          if-no-files-found: ignore
          retention-days: 3

      - name: Persist agent memory
        if: always()
        run: |
          # Belt-and-suspenders: still commit declarative memory (MEMORY.md,
          # USER.md) to the repo so a lost backup cache doesn't cold-start
          # the agent. The hermes backup zip below is the primary persistence
          # path; this is the fallback. Skills are NOT auto-synced — see the
          # backup strip list and scripts/bootstrap-hermes.sh.
          mkdir -p hermes/memories
          rsync -a --delete ~/.hermes/memories/ hermes/memories/ || true

      - name: Create hermes backup
        if: always()
        run: hermes backup -o /tmp/hermes-state.zip

      - name: Strip secrets and ephemera from backup
        if: always()
        run: |
          # Drop secrets, large regenerable state, and the bundled skills
          # library so the cached zip stays small and never carries
          # credentials. .env is re-injected on every run by bootstrap from
          # the DEEPSEEK_API_KEY secret. Missing globs are fine — `zip -d`
          # exits non-zero only on archive errors, which we don't expect.
          zip -d /tmp/hermes-state.zip \
            '.env' \
            'auth.json' \
            'auth.lock' \
            'gateway.lock' \
            'gateway.pid' \
            'gateway_state.json' \
            '.hermes_history' \
            'interrupt_debug.log' \
            'models_dev_cache.json' \
            'config.yaml.bak.*' \
            'logs/*' \
            'sessions/*' \
            'state-snapshots/*' \
            'checkpoints/*' \
            'skills/*' \
            'bin/*' \
            'audio_cache/*' \
            'image_cache/*' \
            'cache/*' \
            'sandboxes/*' \
            || true
          ls -lh /tmp/hermes-state.zip

      - name: Save backup to cache
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /tmp/hermes-state.zip
          key: hermes-state-${{ github.run_id }}

      - name: Save feed cache
        if: always() && steps.layers.outputs.run_l1 == 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: data/feed-cache.json
          key: feed-cache-${{ github.run_id }}

      - name: Save Jina cache
        if: always() && steps.layers.outputs.run_l1 == 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: data/jina-cache
          key: jina-cache-${{ github.run_id }}

      - name: Upload hermes artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: hermes-output
          path: |
            signals/agent/
            signals/updates/
            signals/briefs/
            signals/seen-urls.txt
            signals/agent-queue.txt
            signals/agent-queue-state.json
            hermes/memories/
          if-no-files-found: ignore
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Commit: single committer that merges both artifacts back into a fresh
  # checkout and pushes one commit per day. Runs even if one of the upstream
  # jobs failed, so a metrics-only or hermes-only day still produces a commit.
  # ---------------------------------------------------------------------------
  commit:
    needs: [metrics, hermes]
    if: always() && (needs.metrics.result == 'success' || needs.hermes.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download metrics artifact
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: metrics-output
          path: .

      - name: Download hermes artifact
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: hermes-output
          path: .

      # The agent occasionally appends dedup keys with trailing whitespace,
      # which trips test_seen_urls_format. Strip it before staging so the eval
      # doesn't break on the next run.
      - name: Sanitize seen-urls.txt
        run: python3 scripts/sanitize-seen-urls.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signals/ data/metrics/ hermes/memories/
          if git diff --cached --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git commit -m "chore(hermes): sync $(date -u +%F)"
          # Rebase-and-retry on non-fast-forward. Dated signals/ files and
          # memory updates rarely conflict, so the rebase usually clean-applies.
          for attempt in 1 2 3 4 5; do
            git push && exit 0
            echo "push attempt ${attempt} rejected; rebasing..." >&2
            git pull --rebase || { git rebase --abort; exit 1; }
          done
          exit 1
