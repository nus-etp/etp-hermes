name: hermes-sync

on:
  schedule:
    - cron: '0 13 * * *'        # daily 13:00 UTC = 21:00 SGT
  workflow_dispatch:

concurrency:
  group: hermes-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hermes
        run: |
          curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Bootstrap config
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: bash scripts/bootstrap-hermes.sh

      - name: Run due jobs
        run: hermes cron tick

      - name: Collect outputs
        run: |
          mkdir -p signals
          if [ -d "$HOME/.hermes/cron/output" ]; then
            cp -r "$HOME/.hermes/cron/output/." signals/
          fi

      - name: Commit and push
        run: |
          git config user.name  "hermes-bot"
          git config user.email "hermes-bot@users.noreply.github.com"
          git add signals/
          if git diff --cached --quiet; then
            echo "no signal changes — nothing to commit"
          else
            git commit -m "chore(hermes): daily sync $(date -u +%F)"
            git push
          fi
