name: hermes-sync

on:
  schedule:
    - cron: '0 13 * * *'        # daily 13:00 UTC = 21:00 SGT
  workflow_dispatch:
    inputs:
      layers:
        description: 'Comma-separated layers to run (1=ingest, 2=agent supplement, 3=synthesis). Default: 1,2,3.'
        required: false
        default: '1,2,3'

concurrency:
  group: hermes-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hermes
        run: |
          curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Bootstrap config
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: bash scripts/bootstrap-hermes.sh

      - name: Resolve layers to run
        id: layers
        run: |
          # Schedule cron always runs all three layers. workflow_dispatch can
          # override via the `layers` input (e.g. "3" to re-synthesize only).
          layers="${{ github.event.inputs.layers }}"
          layers="${layers:-1,2,3}"
          echo "layers=$layers" >> "$GITHUB_OUTPUT"
          case ",$layers," in (*,1,*) echo "run_l1=true" >> "$GITHUB_OUTPUT" ;; esac
          case ",$layers," in (*,2,*) echo "run_l2=true" >> "$GITHUB_OUTPUT" ;; esac
          case ",$layers," in (*,3,*) echo "run_l3=true" >> "$GITHUB_OUTPUT" ;; esac

      - name: Layer 1 — data ingestion
        if: steps.layers.outputs.run_l1 == 'true'
        run: hermes -z "$(cat prompts/ingest.md)"

      - name: Build gap-fill queue (fairness rotation)
        # Deterministic pre-step: writes signals/agent-queue.txt with the N
        # least-recently-queried gap-fill companies, ordered by ascending
        # last_queried date. The Layer 2 prompt consumes this as its
        # authoritative gap-fill cohort so the agent doesn't re-hit the same
        # prefix of companies.json every run.
        if: steps.layers.outputs.run_l2 == 'true'
        run: python3 scripts/select_gapfill_queue.py

      - name: Layer 2 — agent supplement
        if: steps.layers.outputs.run_l2 == 'true'
        continue-on-error: true
        run: hermes -z "$(cat prompts/agent_supplement.md)"

      - name: Record gap-fill queue as queried
        # Deterministic post-step: stamps every name in signals/agent-queue.txt
        # as queried today in signals/agent-queue-state.json. Backs the
        # fairness rotation read by select_gapfill_queue.py on the next run.
        if: steps.layers.outputs.run_l2 == 'true'
        run: python3 scripts/update_gapfill_state.py

      - name: Filter exclusions
        # Deterministic post-filter: drops items whose headline matches a
        # company's `exclude_terms` in data/companies.json. Runs before
        # synthesis so Layer 3 reads cleaned files. Idempotent; no-op when
        # nothing matches.
        if: steps.layers.outputs.run_l1 == 'true' || steps.layers.outputs.run_l2 == 'true'
        run: python3 scripts/filter_exclusions.py

      - name: Layer 3 — synthesis
        if: steps.layers.outputs.run_l3 == 'true'
        run: hermes -z "$(cat prompts/synthesis.md)"

      - name: Usage insights
        if: always()
        run: |
          # Hermes-native usage report (tokens, tools, sessions) for today's run.
          # Surfaced in the Actions job summary; not committed.
          {
            echo '## Hermes insights'
            echo '```'
            hermes insights --days 1 --source cli || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stage run logs
        if: always()
        run: |
          # Copy Hermes' per-run logs + session transcripts into the workspace
          # so upload-artifact can grab them. We don't commit these (audit/debug
          # artifacts, not learning), but uploading lets us inspect failures
          # without sshing into a runner. Exclude .env and auth.json — secrets.
          mkdir -p run-logs
          cp -r ~/.hermes/logs run-logs/ 2>/dev/null || true
          cp -r ~/.hermes/sessions run-logs/ 2>/dev/null || true

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-logs-${{ github.run_id }}
          path: run-logs/
          if-no-files-found: ignore
          retention-days: 3

      - name: Persist agent memory
        run: |
          # Round-trip declarative memory (MEMORY.md, USER.md) so the agent's
          # curated facts survive to the next run. Skills are NOT auto-synced:
          # ~/.hermes/skills/ also contains Hermes' bundled skill library, and
          # blindly rsyncing it would commit ~145k lines of upstream artifacts.
          # If/when you author skills, commit them manually under hermes/skills/.
          mkdir -p hermes/memories
          rsync -a --delete ~/.hermes/memories/ hermes/memories/

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signals/ hermes/memories/
          if git diff --cached --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git commit -m "chore(hermes): sync $(date -u +%F)"
          # Rebase-and-retry on non-fast-forward. Dated signals/ files and
          # memory updates rarely conflict, so the rebase usually clean-applies.
          for attempt in 1 2 3 4 5; do
            git push && exit 0
            echo "push attempt ${attempt} rejected; rebasing..." >&2
            git pull --rebase || { git rebase --abort; exit 1; }
          done
          exit 1
